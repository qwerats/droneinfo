<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI News Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    /* Плавный фон */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
      animation: moveBg 10s infinite alternate;
      z-index: -1;
    }

    @keyframes moveBg {
      from { transform: translate(0,0); }
      to { transform: translate(-100px, -100px); }
    }

    .container {
      width: 90%;
      margin: auto;
      padding: 40px 0;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeIn 1s ease;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 600;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      opacity: 0.7;
      margin-top: 10px;
    }

    /* ПОИСК */
    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .search-box input {
      width: 320px;
      padding: 12px 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 15px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
      color: white;
      transition: 0.3s;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .search-box input:focus {
      background: rgba(255,255,255,0.2);
      transform: scale(1.03);
    }

    /* КАРТОЧКА */
    .table-container {
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp 1s ease;
      transition: 0.3s;
    }

    .table-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      background: white;
    }

    /* ФУТЕР */
    .footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.5;
      font-size: 14px;
    }

    /* АНИМАЦИИ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* АДАПТИВ */
    @media(max-width: 768px) {
      .header h1 {
        font-size: 28px;
      }

      iframe {
        height: 400px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>AI News Dashboard</h1>
    <p>Автоматически обновляемые новости с помощью ИИ</p>
  </div>

  <div class="search-box">
    <input type="text" placeholder="🔍 Поиск (визуальный)">
  </div>

  <div class="table-container">
    <iframe 
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRw9piSZPAeMjTOPQXAcMCfCilJYlDVI7uu-O0OtimOw0uGASSAEtZ3loOqL9QPOOcjo8oMFH7s_-Qc/pubhtml?widget=true&amp;headers=false">
    </iframe>
  </div>

  <div class="footer">
    <p>Powered by AI Agent • 2026</p>
  </div>

</div>

</body>
</html>
